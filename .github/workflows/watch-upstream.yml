name: watch-upstream

# Runs daily. Resolves the latest MongoDB version for each tracked major and,
# for any version not already published to GHCR, triggers build-and-publish for
# just the affected majors — so a new image ships within a day of MongoDB's
# release, with no manual step.

on:
  schedule:
    - cron: "23 5 * * *"     # daily 05:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  actions: write             # to dispatch build-and-publish

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find majors with an unpublished latest version
        id: scan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          images="$(python3 scripts/resolve-versions.py --images-only)"
          echo "resolved: $images"

          # Anonymous pull token for the public GHCR repo, then its tag list.
          token="$(curl -fsSL "https://ghcr.io/token?scope=repository:${owner}/leanmongo:pull" | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')"
          published="$(curl -fsSL -H "Authorization: Bearer ${token}" \
            "https://ghcr.io/v2/${owner}/leanmongo/tags/list" 2>/dev/null \
            | python3 -c 'import sys,json;print(" ".join(json.load(sys.stdin).get("tags") or []))' || echo "")"
          echo "published tags: ${published:-<none>}"

          new_majors="$(python3 - "$images" "$published" <<'PY'
          import sys, json
          images = json.loads(sys.argv[1])
          published = set(sys.argv[2].split())
          majors = [i["major"] for i in images if i["version"] not in published]
          print(" ".join(sorted(set(majors))))
          PY
          )"
          echo "majors needing a build: ${new_majors:-<none>}"
          echo "majors=${new_majors}" >> "$GITHUB_OUTPUT"

      - name: Trigger build-and-publish
        if: steps.scan.outputs.majors != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Dispatching build for majors: ${{ steps.scan.outputs.majors }}"
          gh workflow run build-and-publish.yml -f majors="${{ steps.scan.outputs.majors }}"
