name: build-and-publish

# Builds every tracked MongoDB LTS major as a multi-arch (amd64 + arm64) image,
# smoke-tests each arch natively, then publishes to GHCR (always) and Docker Hub
# (when configured).
#
# Triggers:
#   - push / PR        build + test the current code (PRs never publish)
#   - workflow_dispatch manual run (optionally a subset of majors)
#   - schedule (daily)  build ONLY versions not yet published -> new releases
#                       ship within ~a day, automatically
#   - schedule (weekly) rebuild everything on the latest Wolfi base, absorbing
#                       base-image CVE fixes even when MongoDB hasn't changed
#
# The "new version" check lives in the resolve job below (not a separate watcher
# workflow) because a workflow dispatched via GITHUB_TOKEN would be blocked by
# GitHub's anti-recursion rule and never run.

on:
  push:
    branches: [main]
    paths: [Dockerfile, docker-entrypoint.sh, "scripts/**", "test/**", ".github/workflows/build-and-publish.yml"]
  pull_request:
    paths: [Dockerfile, docker-entrypoint.sh, "scripts/**", "test/**", ".github/workflows/build-and-publish.yml"]
  schedule:
    - cron: "23 5 * * *"     # daily 05:23 UTC, builds only new upstream versions
    - cron: "17 4 * * 1"     # Mondays 04:17 UTC, rebuilds everything for base CVEs
  workflow_dispatch:
    inputs:
      majors:
        description: "Space-separated majors to build (blank = tracked default)"
        required: false
        default: ""

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create version tags / releases
  packages: write        # push to GHCR

env:
  DAILY_CRON: "23 5 * * *"

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.r.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - id: r
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MAJORS: ${{ github.event.inputs.majors || '' }}
        run: |
          set -euo pipefail
          if [ -n "$MAJORS" ]; then
            all="$(python3 scripts/resolve-versions.py --majors "$MAJORS" --images-only)"
          else
            all="$(python3 scripts/resolve-versions.py --images-only)"
          fi

          # Force a full rebuild for everything EXCEPT the daily "new-only" cron.
          force=true
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "$DAILY_CRON" ]; then
            force=false
          fi

          if [ "$force" = true ]; then
            matrix="$all"
          else
            owner="${GITHUB_REPOSITORY_OWNER,,}"
            token="$(curl -fsSL "https://ghcr.io/token?scope=repository:${owner}/mongodb-slim:pull" | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])' 2>/dev/null || echo "")"
            published="$(curl -fsSL -H "Authorization: Bearer ${token}" "https://ghcr.io/v2/${owner}/mongodb-slim/tags/list" 2>/dev/null | python3 -c 'import sys,json;print(" ".join(json.load(sys.stdin).get("tags") or []))' 2>/dev/null || echo "")"
            echo "already published: ${published:-<none>}"
            matrix="$(python3 - "$all" "$published" <<'PY'
          import sys, json
          images = json.loads(sys.argv[1])
          published = set(sys.argv[2].split())
          print(json.dumps([i for i in images if i["version"] not in published]))
          PY
          )"
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Will build:"; echo "$matrix" | python3 -m json.tool

  test:
    needs: resolve
    if: needs.resolve.outputs.matrix != '[]' && needs.resolve.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.resolve.outputs.matrix) }}
        arch:
          - { platform: amd64, runner: ubuntu-latest }
          - { platform: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build (${{ matrix.arch.platform }}) MongoDB ${{ matrix.image.version }}
        run: |
          docker buildx build --load \
            --platform linux/${{ matrix.arch.platform }} \
            --build-arg MONGO_VERSION=${{ matrix.image.version }} \
            --build-arg MONGO_TARGET=${{ matrix.image.target }} \
            --build-arg MONGO_SHA256_AMD64=${{ matrix.image.sha256_amd64 }} \
            --build-arg MONGO_SHA256_ARM64=${{ matrix.image.sha256_arm64 }} \
            --build-arg MONGOSH_VERSION=${{ matrix.image.mongosh_version }} \
            --build-arg MONGOSH_SHA256_AMD64=${{ matrix.image.mongosh_sha256_amd64 }} \
            --build-arg MONGOSH_SHA256_ARM64=${{ matrix.image.mongosh_sha256_arm64 }} \
            --cache-from type=gha,scope=${{ matrix.image.version }}-${{ matrix.arch.platform }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.image.version }}-${{ matrix.arch.platform }} \
            -t mongodb-slim:ci .
      - name: Smoke test (${{ matrix.arch.platform }})
        run: ./test/smoke-test.sh mongodb-slim:ci ${{ matrix.image.version }}

  publish:
    needs: [resolve, test]
    if: github.event_name != 'pull_request' && needs.resolve.outputs.matrix != '[]' && needs.resolve.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Compute image references + registries
        id: cfg
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          TAGS: ${{ join(matrix.image.tags, ' ') }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          ghcr="ghcr.io/${owner}/mongodb-slim"
          dhub=""
          dockerhub_enabled=false
          if [ -n "${DOCKERHUB_NAMESPACE}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            dhub="docker.io/${DOCKERHUB_NAMESPACE}/mongodb-slim"
            dockerhub_enabled=true
          fi
          refs=""
          for t in $TAGS; do
            refs="${refs}${ghcr}:${t}"$'\n'
            [ "$dockerhub_enabled" = true ] && refs="${refs}${dhub}:${t}"$'\n'
          done
          {
            echo "dockerhub_enabled=${dockerhub_enabled}"
            echo "refs<<EOF"; printf '%s' "$refs"; echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: steps.cfg.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push (amd64 + arm64) MongoDB ${{ matrix.image.version }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.cfg.outputs.refs }}
          build-args: |
            MONGO_VERSION=${{ matrix.image.version }}
            MONGO_TARGET=${{ matrix.image.target }}
            MONGO_SHA256_AMD64=${{ matrix.image.sha256_amd64 }}
            MONGO_SHA256_ARM64=${{ matrix.image.sha256_arm64 }}
            MONGOSH_VERSION=${{ matrix.image.mongosh_version }}
            MONGOSH_SHA256_AMD64=${{ matrix.image.mongosh_sha256_amd64 }}
            MONGOSH_SHA256_ARM64=${{ matrix.image.mongosh_sha256_arm64 }}
          # Reuse the per-arch layers the test job already built natively, so
          # the arm64 side is a cache hit here instead of a slow QEMU rebuild.
          cache-from: |
            type=gha,scope=${{ matrix.image.version }}-amd64
            type=gha,scope=${{ matrix.image.version }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.image.version }}-multi

      - name: Tag release v${{ matrix.image.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ matrix.image.version }}
        run: |
          set -euo pipefail
          if gh release view "v$V" >/dev/null 2>&1; then
            echo "release v$V already exists, skipping"
          else
            gh release create "v$V" \
              --title "MongoDB $V" \
              --notes "mongodb-slim image for MongoDB Community Server $V (mongosh ${{ matrix.image.mongosh_version }}, base target ${{ matrix.image.target }}). Tags: ${{ join(matrix.image.tags, ', ') }}." \
              --target "$GITHUB_SHA"
          fi
